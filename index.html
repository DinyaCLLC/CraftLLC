        body {
            #background-color: #141414;
            background-image: url("/bg.png");
            background-attachment: fixed;
            backdrop-filter: blur(5px);
            color: white;
            font-family: Arial, sans-serif;

        }

        button {
            background: linear-gradient(to right, #FFA600, #FFBB00);
            width: 90%;
            height: 45px;
            border-radius: 10px;
            border: none;
            cursor: pointer;

        h1,

            margin: 20px 0;
        }

        p {
            margin: 10px 0;
        }

        a {
            text-decoration: none;
            color: white;
        }

        iframe {
            width: 100%;
            border: none;
            min-height: 100px;
            display: block;
        }

        /* Лоадер */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #141414;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader {
            width: 50px;
            aspect-ratio: 1;
            border-radius: 50%;
            background:
                radial-gradient(farthest-side, #ffa516 94%, #0000) top/8px 8px no-repeat,
                conic-gradient(#0000 30%, #ffa516);
            -webkit-mask: radial-gradient(farthest-side, #0000 calc(100% - 8px), #000 0);
            animation: l13 1s infinite linear;
        }

        @keyframes l13 {
            100% {
                transform: rotate(1turn)
            }
        }

        /* Стилі для хедера (Flexbox) */
        header {
            padding: 10px;
            background-color: #161616;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            /* Розносить лого і меню */
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .logo-container img {
            height: 40px;
            width: auto;
            display: block;
        }

        /* Стилі для горизонтальної навігаційної панелі на великих екранах */
        .nav-menu ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            /* Горизонтальне меню */
            gap: 20px;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            font-weight: bold;
            transition: color 0.3s;

        .nav-menu a:hover {

        /* Приховуємо кнопку гамбургера на великих екранах за замовчуванням */

            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .menu-toggle i {
            display: flex;
            align-self: start;
        }

        footer {
            margin: 0;
            padding: 40px 0;
            background-color: #161616;
            box-sizing: border-box;
            width: 100%;
        }

        footer .social {
            text-align: center;
            padding-bottom: 25px;
            font-size: 24px;

        }

        footer .social a {
            border: 1px solid #ccc;
            border-radius: 30%;

            height: 40px;
            line-height: 38px;
            display: inline-block;
            text-align: center;

        }

        footer .social a:hover {

        }

        footer .social .fa-telegram {

        }

            right: 20px;

            /* Hidden by default */

            text-align: left;

        .profile-dropdown p {

            font-size: 14px;

        .profile-dropdown button {

            margin-top: 10px;
            background: linear-gradient(to right, #FF4500, #FF6347);

        .profile-dropdown button.account-btn {

        }

        /* Styles for the cheat code modal */
        .modal {
            display: none;
            /* Hidden by default */
            position: fixed;
            /* Stay in place */
            z-index: 10000;
            /* Sit on top */
            left: 0;
            top: 0;
            width: 100%;
            /* Full width */
            height: 100%;
            /* Full height */
            overflow: auto;
            /* Enable scroll if needed */
            background-color: rgba(0, 0, 0, 0.7);
            /* Black w/ opacity */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #1e1e1e;
            margin: auto;
            padding: 30px;
            border: 1px solid #888;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
        }

        .modal-content input[type="text"] {

            /* Adjust for padding */

            margin-bottom: 20px;
            border: 1px solid #ffa516;
            border-radius: 8px;

        .modal-content button {

        }

        .modal-content button:hover {

        .modal-message {

        /* Styles for the new active cheat codes modal */
        .active-codes-list {

            overflow-y: auto;
            padding: 10px;
            border: 1px solid #333;

        .active-code-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background-color: #333;
            border-radius: 5px;
            color: white;
        }

        .active-code-item:last-child {

        .active-code-item span {

            text-align: left;
            padding-left: 10px;
        }

        .active-code-item button {

            font-size: 0.9em;
        }

        @media (max-width: 768px) {

            /* Показуємо гамбургер-кнопку */
            .menu-toggle {

            .nav-menu {
                display: none;
                position: absolute;
                top: 60px;
                /* Висота хедера + невеликий відступ */
                left: 0;
                width: 100%;
                background-color: #161616;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);

                text-align: left;
            }

            /* Меню, коли воно активне (показується) */
            .nav-menu.active {
                display: block;
            }

            /* Робимо список вертикальним */
            .nav-menu ul {
                flex-direction: column;
                padding: 10px 5%;
            }

            .nav-menu li {
                margin: 0;
            }

            /* Стилізуємо посилання як блок, щоб вони займали всю ширину */
            .nav-menu a {
                display: block;
                padding: 10px 0;
                border-bottom: 1px solid #222;
            }

            /* Прибираємо нижню межу на останньому елементі */
            .nav-menu li:last-child a {
                border-bottom: none;
            }
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loaderWrapper = document.getElementById('loader-wrapper');
            if (loaderWrapper) {
                loaderWrapper.style.display = 'none';
            }
        });

        function adjustAllIframesHeight() {
            const iframes = document.querySelectorAll("iframe");
            iframes.forEach(iframe => {
                try {
                    if (iframe.contentWindow && iframe.contentWindow.document && iframe.contentWindow.document.body) {
                        const contentHeight = iframe.contentWindow.document.body.scrollHeight;
                        if (contentHeight > 0) {
                            iframe.style.height = (contentHeight + 20) + "px"; // Add a 20px buffer
                        }
                    }
                } catch (e) {
                    console.error("Не вдається отримати висоту вмісту через політику безпеки браузера або iframe ще не завантажився:", e);
                }
            });
        }

        window.addEventListener("load", () => {
            adjustAllIframesHeight();
            setInterval(adjustAllIframesHeight, 500);
        });

        window.addEventListener('message', (event) => {
            if (event.data.type === 'openCheatCodeModal') {
                const cheatCodeModal = document.getElementById('cheatCodeModal');
                const cheatCodeInput = document.getElementById('cheatCodeInput');
                const modalMessage = document.getElementById('modalMessage');

                cheatCodeInput.value = '';
                modalMessage.textContent = '';
                cheatCodeModal.style.display = 'flex';
            }
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // ЛОГІКА ДЛЯ АДАПТИВНОГО МЕНЮ
            const menuToggle = document.querySelector('.menu-toggle');
            const navMenu = document.querySelector('.nav-menu');

            if (menuToggle && navMenu) {
                menuToggle.addEventListener('click', () => {
                    const isExpanded = menuToggle.getAttribute('aria-expanded') === 'true' || false;

                    // Перемикаємо клас active для відображення меню
                    navMenu.classList.toggle('active');

                    // Оновлюємо атрибут для доступності
                    menuToggle.setAttribute('aria-expanded', !isExpanded);
                });
            }
        });
    </script>

    <script>
        window.addEventListener('message', (event) => {
            if (event.data.type === 'openCheatCodeModal') {
                const cheatCodeModal = document.getElementById('cheatCodeModal');
                const cheatCodeInput = document.getElementById('cheatCodeInput');
                const modalMessage = document.getElementById('modalMessage');

                cheatCodeInput.value = '';
                modalMessage.textContent = '';
                cheatCodeModal.style.display = 'flex';
            } else if (event.data.type === 'CHEAT_CODE_RESULT') {
                const cheatCodeModal = document.getElementById('cheatCodeModal');
                const modalMessage = document.getElementById('modalMessage');
                if (event.data.success) {
                    modalMessage.style.color = 'green';
                    modalMessage.textContent = 'Чит-код прийнято! Рецепт розблоковано.';
                    setTimeout(() => {
                        cheatCodeModal.style.display = 'none';
                    }, 1500);
                } else {
                    modalMessage.style.color = 'red';
                    modalMessage.textContent = 'Невірний чит-код або рецепт вже доступний.';
                }
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
            const cheatCodeModal = document.getElementById('cheatCodeModal');
            const cancelCheatCodeBtn = document.getElementById('cancelCheatCode');
            const submitCheatCodeBtn = document.getElementById('submitCheatCode');
            const cheatCodeInput = document.getElementById('cheatCodeInput');
            const modalMessage = document.getElementById('modalMessage');
            const recipesIframe = document.getElementById('recipesIframe');

            cancelCheatCodeBtn.addEventListener('click', () => {
                cheatCodeModal.style.display = 'none';
            });

            window.addEventListener('click', (event) => {
                if (event.target == cheatCodeModal) {
                    cheatCodeModal.style.display = 'none';
                }
            });

            submitCheatCodeBtn.addEventListener('click', () => {
                const enteredCode = cheatCodeInput.value.trim().toLowerCase();
                if (recipesIframe && recipesIframe.contentWindow) {
                    recipesIframe.contentWindow.postMessage({ type: 'SUBMIT_CHEAT_CODE', code: enteredCode }, '*');
                }
            });
        });

        // Функція для перевірки сесії користувача
        async function checkUserSession() {
            const authContainer = document.getElementById('authContainer');
            // authContainer.innerHTML = ''; // Очищаємо контейнер

            try {
                const response = await fetch('/api/user', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const userData = await response.json();
                    if (userData && userData.username) {
                        // Користувач авторизований
                        const profileInfoDiv = document.createElement('div');
                        profileInfoDiv.className = 'profile-info';
                        profileInfoDiv.onclick = toggleProfileDropdown;

                        const avatarDiv = document.createElement('div');
                        avatarDiv.className = 'avatar';
                        if (userData.avatar_url) {
                            const avatarImg = document.createElement('img');
                            avatarImg.src = userData.avatar_url;
                            avatarImg.alt = 'User Avatar';
                            avatarDiv.appendChild(avatarImg);
                        } else {
                            avatarDiv.textContent = userData.username.charAt(0).toUpperCase(); // Перша літера імені
                        }
                        profileInfoDiv.appendChild(avatarDiv);

                        const usernameSpan = document.createElement('span');
                        usernameSpan.textContent = userData.username;
                        profileInfoDiv.appendChild(usernameSpan);

                        // authContainer.appendChild(profileInfoDiv); // Re-add if authContainer is uncommented

                        const profileDropdownDiv = document.createElement('div');
                        profileDropdownDiv.className = 'profile-dropdown';
                        profileDropdownDiv.id = 'profileDropdown';

                        const nameP = document.createElement('p');
                        nameP.textContent = `Ім'я користувача: ${userData.username}`;
                        profileDropdownDiv.appendChild(nameP);

                        if (userData.name) {
                            const realNameP = document.createElement('p');
                            realNameP.textContent = `Справжнє ім'я: ${userData.name}`;
                            profileDropdownDiv.appendChild(realNameP);
                        }

                        const accountButton = document.createElement('button');
                        accountButton.className = 'auth-button account-btn'; // Додаємо клас для стилів
                        accountButton.textContent = 'Мій акаунт';
                        accountButton.onclick = () => window.location.href = '/account';
                        profileDropdownDiv.appendChild(accountButton);

                        const logoutButton = document.createElement('button');
                        logoutButton.textContent = 'Вийти';
                        logoutButton.onclick = logoutUser;
                        profileDropdownDiv.appendChild(logoutButton);

                        // authContainer.appendChild(profileDropdownDiv); // Re-add if authContainer is uncommented

                    } else {
                        // Користувач не авторизований
                        // renderAuthButtons(); // Re-add if renderAuthButtons is uncommented
                    }
                } else {
                    // Сервер повернув помилку або користувач не авторизований
                    // renderAuthButtons(); // Re-add if renderAuthButtons is uncommented
                }
            } catch (error) {
                console.error('Помилка перевірки сесії:', error);
                // renderAuthButtons(); // У випадку помилки теж показуємо кнопки авторизації // Re-add if renderAuthButtons is uncommented
            }
        }

        // Функція для перемикання випадаючого меню профілю
        function toggleProfileDropdown() {
            const dropdown = document.getElementById('profileDropdown');
            if (dropdown) {
                dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
            }
        }

        // Обробник кліку поза випадаючим меню для його закриття
        document.addEventListener('click', (event) => {
            const authContainer = document.getElementById('authContainer');
            const dropdown = document.getElementById('profileDropdown');
            if (dropdown && authContainer && !authContainer.contains(event.target)) {
                dropdown.style.display = 'none';
            }
        });

        // Функція для виходу користувача
        async function logoutUser() {
            try {
                const response = await fetch('/api/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    window.location.reload(); // Перезавантажуємо сторінку після успішного виходу
                } else {
                    // Using a custom modal message instead of alert()
                    const modal = document.createElement('div');
                    modal.className = 'modal';
                    modal.innerHTML = `
                        <div class="modal-content">
                            <h3>Помилка</h3>
                            <p>Помилка при виході. Спробуйте ще раз.</p>
                            <button onclick="this.closest('.modal').style.display='none'">Закрити</button>
                        </div>
                    `;
                    document.body.appendChild(modal);
                    modal.style.display = 'flex';
                    console.error('Помилка виходу:', await response.text());
                }
            } catch (error) {
                // Using a custom modal message instead of alert()
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>Помилка мережі</h3>
                        <p>Помилка мережі при виході. Перевірте з'єднання.</p>
                        <button onclick="this.closest('.modal').style.display='none'">Закрити</button>
                    </div>
                `;
                document.body.appendChild(modal);
                modal.style.display = 'flex';
                console.error('Помилка мережі при виході:', error);
            }
        }

        // Викликаємо функцію перевірки сесії при завантаженні сторінки
        // document.addEventListener('DOMContentLoaded', checkUserSession); // This was commented out in original selection
    </script>
