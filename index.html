    <meta name="keywords" content="CraftLLC, craftllc.pages.dev, Site, Сайт, Рецепти, Бабуся.">
    <meta name="robots" content="index, follow">
    <meta name="google-site-verification" content="Vb3DSk3tL1t77Z6-wuc0sSOz4ivMr8ioTF8WVNe9Trk" />
    <title>Головна — CraftLLC</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <style>
        /* Загальні стилі */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #141414;
            color: #f4f4f9;
            line-height: 1.6;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Хедер */
        header {
            background: #161616;
            border-bottom: 1px solid #333;
            padding: 15px 0;
            margin-bottom: 30px;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5em;
            font-weight: bold;
            text-decoration: none;
            color: #f4f4f9;
        }
        
        nav a {
            color: #f4f4f9;
            text-decoration: none;
            margin-left: 20px;
        }

        #auth-container .btn {
            margin-left: 10px;
            padding: 8px 12px;
            text-decoration: none;
            border: 1px solid #555;
            border-radius: 5px;
            font-size: 0.9em;
            transition: background-color 0.2s;
        }

        #auth-container .btn-secondary {
            background-color: #333;
            color: #fff;
        }
        #auth-container .btn-secondary:hover {
            background-color: #444;
        }

        #auth-container .btn-primary {
            background-color: #FFA600;
            color: #141414;
            border-color: #FFA600;
        }
        #auth-container .btn-primary:hover {
            background-color: #FFBB00;
        }

        #auth-container #profile-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #FFA600;
            color: #141414;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
        }

        #auth-container #logout-btn {
            background: none;
            border: none;
            color: #dc3545;
            cursor: pointer;
            margin-left: 15px;
            font-size: 0.9em;
        }
        
        main {
            text-align: center;
        }
        
        iframe {
            border: none;
            width: 100%;
            height: 500px; /* Приклад висоти */
            margin-top: 20px;
        }

        footer {
            margin-top: 40px;
            padding: 40px 0;
            background-color: #161616;
            box-sizing: border-box;
            width: 100%;
        }
        footer .social {
            text-align: center;
            padding-bottom: 25px;
            font-size: 24px;
        }
        footer .social a {
            color: #ccc;
            border: 1px solid #ccc;
            border-radius: 30%;
            width: 40px;
            height: 40px;
            line-height: 38px;
            display: inline-block;
            text-align: center;
            margin: 0 6px;
            opacity: 0.75;
        }
        footer .social a:hover {
            opacity: 1.0;
        }
        footer .copyright {
            margin-top: 5px;
            text-align: center;
            font-size: 13px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <noscript>
        <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #141414; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10001; text-align: center; padding: 20px;">
            <h1>JavaScript вимкнено</h1>
            <p>Цей сайт вимагає увімкненого JavaScript для коректної роботи.</p>
        </div>
    </noscript>

    <header>
        <div class="container">
            <a href="/" class="logo">CraftLLC</a>
            <nav>
                 <a href="/contacts">Контакти</a>
                 <a href="/recipes">Рецепти</a>
            </nav>
            <div id="auth-container"></div>
        </div>
    </header>

    <main class="container">
        <h1>Головна</h1>
        <h1>QR-код</h1>
        <img src="/qr.png" alt="QR-код на цей сайт." width="256" height="256">
        <iframe id="recipesIframe" src="/recipes?mainPageView=true" sandbox="allow-same-origin allow-scripts allow-popups" scrolling="no"></iframe>
        <iframe src="/contacts?mainPageView=true" sandbox="allow-same-origin allow-scripts allow-popups" scrolling="no"></iframe>
    </main>

    <footer id="footerID">
        <div class="social">
            <a href="https://t.me/CraftLLC" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://m.youtube.com/@CraftLLCOF" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://github.com/CraftLLC" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://x.com/NotCraftLLC" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://instagram.com/CraftLLC" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>

        <p class="copyright">© Андрій Рудик 2024-2025</p>
    </footer>

    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "86e4717144d44d26a30bb98452c1e06b"}'></script>
    <script>
        // --- Вбудована логіка автентифікації ---
        document.addEventListener('DOMContentLoaded', () => {
            const authContainer = document.getElementById('auth-container');

            const checkLoginStatus = async () => {
                try {
                    const response = await fetch('/api/me');
                    if (response.ok) {
                        const user = await response.json();
                        renderLoggedIn(user);
                    } else {
                        renderLoggedOut();
                    }
                } catch (error) {
                    console.error('Error checking login status:', error);
                    renderLoggedOut();
                }
            };

            const renderLoggedOut = () => {
                if (!authContainer) return;
                authContainer.innerHTML = `
                    <a href="/register/" class="btn btn-secondary">Реєстрація</a>
                    <a href="/login/" class="btn btn-primary">Вхід</a>
                `;
            };

            const renderLoggedIn = (user) => {
                if (!authContainer) return;
                const initial = user.username.charAt(0).toUpperCase();
                authContainer.innerHTML = `
                    <a href="/account/" id="profile-icon" title="Мій акаунт">${initial}</a>
                    <button id="logout-btn" title="Вийти">Вийти</button>
                `;
                document.getElementById('logout-btn').addEventListener('click', handleLogout);
            };

            const handleLogout = async () => {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/';
            };

            checkLoginStatus();
        });
    </script>
</body>
</html>
