<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="На сайті CraftLLC, ви знайдете корисні рецепти. І всі перевірені!">
    <meta name="keywords" content="CraftLLC, craftllc.pages.dev, Site, Сайт, Рецепти, Бабуся.">
    <meta name="robots" content="index, follow">
    <meta name="google-site-verification" content="Vb3DSk3tL1t77Z6-wuc0sSOz4ivMr8ioTF8WVNe9Trk" />
    <title>Головна | CraftLLC</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/recipesCheatCodeModal.css">

    <header>
        <button class="menu-toggle" aria-label="Перемкнути навігаційну панель" aria-expanded="false">
            <i class="fas fa-bars"></i>
        </button>

        <div class="logo-container">
            <a href="/">
                <img src="/static/img/logo.png" id="header-logo" alt="Логотип CraftLLC">
            </a>
        </div>

        <nav class="nav-menu">
            <ul>
                <li><a href="/">Головна</a></li>
                <li><a href="/contacts">Контакти</a></li>
                <li><a href="/recipes">Рецепти</a></li>
                <li><a href="/account">Акаунт</a></li>
            </ul>
        </nav>
    </header>

    <script src="/static/js/main.js" defer></script>
    <script src="/static/js/index.js" defer></script>
    <script src="/static/js/snow.js" defer></script>
</head>

<body>
    <noscript>
        <div
            style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #141414; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10001; text-align: center; padding: 20px;">
            <h1>JavaScript вимкнено</h1>
            <p>Цей сайт вимагає увімкненого JavaScript для коректної роботи.</p>
            <p>Будь ласка, увімкніть JavaScript у налаштуваннях вашого браузера, щоб продовжити.</p>
        </div>
    </noscript>

    <div id="loader-wrapper">
        <div class="loader"></div>
    </div>

    <!-- Cheat Code Modal -->
    <div id="cheatCodeModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Введіть чит-код</h2>
            <input type="text" id="cheatCodeInput" placeholder="Ваш чит-код">
            <button id="submitCheatCode">Підтвердити</button>
            <button id="cancelCheatCode">Скасувати</button>
            <p id="modalMessage" class="modal-message"></p>
        </div>
    </div>

    <!-- Active Cheat Codes Modal -->
    <div id="activeCheatCodesModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Активні чит-коди</h2>
            <div id="activeCheatCodesList" class="active-codes-list">
                <!-- Active cheat codes will be rendered here -->
            </div>
            <br>
            <button id="addCheatCodeBtn">Додати чит-код</button>
            <button id="closeActiveCheatCodesModal">Закрити</button>
        </div>
    </div>

    <h1>Головна</h1>
    <h1>QR-код</h1>
    <img src="/static/img/qr.png" alt="QR-код на цей сайт." width="256" height="256">
    <iframe id="recipesIframe" src="/recipes?mainPageView=true"
        sandbox="allow-same-origin allow-scripts allow-popups" scrolling="no"></iframe>
    <iframe src="/contacts?mainPageView=true" sandbox="allow-same-origin allow-scripts allow-popups"
        scrolling="no"></iframe>

    <footer id="footerID">
        <div class="social">
            <a href="https://t.me/CraftLLC" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://m.youtube.com/@CraftLLCOF" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://github.com/CraftLLC" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://x.com/NotCraftLLC" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://instagram.com/CraftLLC" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>

        <p class="copyright">© Андрій Рудик 2024-2025</p>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
