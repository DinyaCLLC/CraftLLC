    <script>
        function adjustAllIframesHeight() {
            const iframes = document.querySelectorAll("iframe");
            iframes.forEach(iframe => {
                try {
                    if (iframe.contentWindow && iframe.contentWindow.document && iframe.contentWindow.document.body) {
                        const contentHeight = iframe.contentWindow.document.body.scrollHeight;
                        if (contentHeight > 0) {
                            iframe.style.height = contentHeight + "px";
                        }
                    }
                } catch (e) {
                    console.error("Не вдається отримати висоту вмісту через політику безпеки браузера або iframe ще не завантажився:", e);
                }
            });
        }

        window.addEventListener("load", () => {
            const loaderWrapper = document.getElementById('loader-wrapper');
            if (loaderWrapper) {
                loaderWrapper.style.display = 'none';
            }
            adjustAllIframesHeight();
            setInterval(adjustAllIframesHeight, 500);
        });

        function setSpecialDateAssets() {
            const today = new Date();
            const day = today.getDate();
            const month = today.getMonth() + 1;

            const favicon = document.querySelector('link[rel="icon"]');
            const logo = document.getElementById('logo');

            if (!favicon || !logo) return;

            if (month === 1 && day === 1) {
                favicon.href = '/favicon2.ico';
                logo.src = '/logo2.png';
            }
            else if (month === 3 && day === 8) {
                favicon.href = '/favicon.ico';
                logo.src = '/logo3.png';
            }
            else if (month === 9 && day === 26) {
                favicon.href = '/favicon_birthday.ico';
                logo.src = '/logo_birthday.png';
            }
            else {
                favicon.href = '/favicon.ico';
                logo.src = '/logo.png';
            }
        }

        document.addEventListener("DOMContentLoaded", setSpecialDateAssets);
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // ЛОГІКА ДЛЯ АДАПТИВНОГО МЕНЮ
            const menuToggle = document.querySelector('.menu-toggle');
            const navMenu = document.querySelector('.nav-menu');

            if (menuToggle && navMenu) {
                menuToggle.addEventListener('click', () => {
                    const isExpanded = menuToggle.getAttribute('aria-expanded') === 'true' || false;
                    
                    // Перемикаємо клас active для відображення меню
                    navMenu.classList.toggle('active'); 
                    
                    // Оновлюємо атрибут для доступності
                    menuToggle.setAttribute('aria-expanded', !isExpanded); 
                });
            }
        });
    </script>

    <script>
        // Load cheat codes from localStorage or initialize empty
        let cheatCodesUsed = JSON.parse(localStorage.getItem('cheatCodesUsed')) || {};

        // Функція для збереження активних чит-кодів у localStorage
        function saveCheatCodes() {
            localStorage.setItem('cheatCodesUsed', JSON.stringify(cheatCodesUsed));
        }

        // Функція для відображення активних чит-кодів у модальному вікні
        async function renderActiveCheatCodes() {
            const activeCheatCodesList = document.getElementById('activeCheatCodesList');
            activeCheatCodesList.innerHTML = ''; // Очистити попередній список

            const recipesIframe = document.getElementById('recipesIframe');
            let hasActiveCodes = false;

            // Перевіряємо, чи iframe завантажений і доступний
            if (recipesIframe && recipesIframe.contentWindow && recipesIframe.contentWindow.document) {
                try {
                    const iframeDoc = recipesIframe.contentWindow.document;
                    const allCardsInIframe = iframeDoc.querySelectorAll('.card');

                    allCardsInIframe.forEach((card, index) => {
                        const cardId = `card-${index}`; // Assuming cardId in iframe matches parent's logic
                        const cheatCodeAttribute = card.dataset.cheatcode;
                        const dateAttribute = card.dataset.date;

                        // Показувати тільки якщо чит-код існує для картки І він активний І дата ще не настала природним шляхом
                        if (cheatCodeAttribute && cheatCodesUsed[cardId] === true) {
                            const [day, month, year] = dateAttribute.split('.').map(Number);
                            const releaseDate = new Date(year, month - 1, day);
                            const now = new Date();

                            if (now.getTime() < releaseDate.getTime()) { // Показувати тільки якщо все ще обійдено
                                hasActiveCodes = true;
                                const cardTitleElement = card.querySelector('.card__title');
                                const cardTitle = cardTitleElement ? (cardTitleElement.dataset.originalTitle || cardTitleElement.textContent) : 'Невідомий рецепт';

                                const itemDiv = document.createElement('div');
                                itemDiv.classList.add('active-code-item');
                                itemDiv.innerHTML = `
                                    <span>${cardTitle} (${cheatCodeAttribute})</span>
                                    <button class="remove-cheat-code-btn" data-card-id="${cardId}">Вимкнути</button>
                                `;
                                activeCheatCodesList.appendChild(itemDiv);
                            }
                        }
                    });
                } catch (e) {
                    console.error("Помилка доступу до iframe для рендерингу чит-кодів:", e);
                    activeCheatCodesList.innerHTML = '<p style="color: #aaa;">Не вдалося завантажити активні чит-коди. Переконайтеся, що сторінка рецептів завантажена.</p>';
                }
            } else {
                activeCheatCodesList.innerHTML = '<p style="color: #aaa;">Сторінка рецептів ще не завантажена або недоступна.</p>';
            }


            if (!hasActiveCodes && activeCheatCodesList.innerHTML === '') { // Only if no codes were added and no error message
                activeCheatCodesList.innerHTML = '<p style="color: #aaa;">Немає активних чит-кодів.</p>';
            }

            // Додати обробники подій для кнопок "Вимкнути"
            activeCheatCodesList.querySelectorAll('.remove-cheat-code-btn').forEach(button => {
                button.addEventListener('click', (event) => {
                    const cardIdToRemove = event.target.dataset.cardId;
                    delete cheatCodesUsed[cardIdToRemove]; // Видалити активний стан
                    saveCheatCodes(); // Зберегти оновлений стан
                    // Надсилаємо повідомлення iframe, щоб він оновився
                    const recipesIframe = document.getElementById('recipesIframe');
                    if (recipesIframe && recipesIframe.contentWindow) {
                        recipesIframe.contentWindow.postMessage({ type: 'UPDATE_RECIPES_DISPLAY' }, window.location.origin);
                    }
                    renderActiveCheatCodes(); // Повторно відрендерити список у модальному вікні
                });
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            const logo = document.getElementById('logo');
            const cheatCodeModal = document.getElementById('cheatCodeModal');
            const cheatCodeInput = document.getElementById('cheatCodeInput');
            const submitCheatCodeBtn = document.getElementById('submitCheatCode');
            const cancelCheatCodeBtn = document.getElementById('cancelCheatCode');
            const modalMessage = document.getElementById('modalMessage');

            const activeCheatCodesModal = document.getElementById('activeCheatCodesModal');
            const addCheatCodeBtn = document.getElementById('addCheatCodeBtn');
            const closeActiveCheatCodesModal = document.getElementById('closeActiveCheatCodesModal');

            let lastClickTime = 0;
            const doubleClickThreshold = 300; // milliseconds

            logo.addEventListener('click', (event) => {
                const currentTime = new Date().getTime();
                if (currentTime - lastClickTime < doubleClickThreshold) {
                    // Double click detected, open active cheat codes modal
                    renderActiveCheatCodes(); // Render the list before showing
                    activeCheatCodesModal.style.display = 'flex';
                }
                lastClickTime = currentTime;
            });

            submitCheatCodeBtn.addEventListener('click', () => {
                const enteredCode = cheatCodeInput.value.trim().toLowerCase(); // Convert to lowercase
                let foundMatch = false;

                const recipesIframe = document.getElementById('recipesIframe');
                if (recipesIframe && recipesIframe.contentWindow && recipesIframe.contentWindow.document) {
                    try {
                        const iframeDoc = recipesIframe.contentWindow.document;
                        iframeDoc.querySelectorAll('.card').forEach((card, index) => {
                            const dateAttribute = card.dataset.date;
                            const cheatCodeAttribute = card.dataset.cheatcode ? card.dataset.cheatcode.toLowerCase() : null; // Convert to lowercase
                            const cardId = `card-${index}`;

                            if (dateAttribute && cheatCodeAttribute && enteredCode === cheatCodeAttribute) {
                                const [day, month, year] = dateAttribute.split('.').map(Number);
                                const releaseDate = new Date(year, month - 1, day);
                                const now = new Date();

                                if (now.getTime() < releaseDate.getTime()) {
                                    // If date has not passed, and cheat code matches
                                    cheatCodesUsed[cardId] = true; // Mark this card as bypassed
                                    saveCheatCodes(); // Save updated state
                                    foundMatch = true;
                                }
                            }
                        });
                    } catch (e) {
                        console.error("Помилка доступу до iframe при введенні чит-коду:", e);
                        modalMessage.style.color = 'red';
                        modalMessage.textContent = 'Помилка: не вдалося перевірити чит-код. Спробуйте ще раз.';
                        return; // Exit function if iframe access fails
                    }
                } else {
                    modalMessage.style.color = 'red';
                    modalMessage.textContent = 'Сторінка рецептів ще не завантажена або недоступна.';
                    return; // Exit if iframe is not ready
                }


                if (foundMatch) {
                    modalMessage.style.color = 'green';
                    modalMessage.textContent = 'Чит-код прийнято! Рецепт розблоковано.';
                    setTimeout(() => {
                        cheatCodeModal.style.display = 'none';
                        // Надсилаємо повідомлення iframe, щоб він оновився
                        if (recipesIframe && recipesIframe.contentWindow) {
                            recipesIframe.contentWindow.postMessage({ type: 'UPDATE_RECIPES_DISPLAY' }, window.location.origin);
                        }
                    }, 1500);
                } else {
                    modalMessage.style.color = 'red';
                    modalMessage.textContent = 'Невірний чит-код або рецепт вже доступний.';
                }
            });

            cancelCheatCodeBtn.addEventListener('click', () => {
                cheatCodeModal.style.display = 'none';
            });

            // Event listeners for the new modal buttons
            addCheatCodeBtn.addEventListener('click', () => {
                activeCheatCodesModal.style.display = 'none'; // Close active codes modal
                cheatCodeModal.style.display = 'flex'; // Open cheat code input modal
                cheatCodeInput.value = '';
                modalMessage.textContent = '';
            });

            closeActiveCheatCodesModal.addEventListener('click', () => {
                activeCheatCodesModal.style.display = 'none';
            });

            // Add an event listener for the iframe's load event
            const recipesIframe = document.getElementById('recipesIframe');
            if (recipesIframe) {
                recipesIframe.onload = () => {
                    console.log("Recipes iframe loaded.");
                    // Надсилаємо початкове повідомлення iframe після завантаження
                    if (recipesIframe.contentWindow) {
                        recipesIframe.contentWindow.postMessage({ type: 'UPDATE_RECIPES_DISPLAY' }, window.location.origin);
                    }
                };
            }
        });

        // Функція для перевірки сесії користувача
        async function checkUserSession() {
            const authContainer = document.getElementById('authContainer');
            // authContainer.innerHTML = ''; // Очищаємо контейнер

            try {
                const response = await fetch('/api/user', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const userData = await response.json();
                    if (userData && userData.username) {
                        // Користувач авторизований
                        const profileInfoDiv = document.createElement('div');
                        profileInfoDiv.className = 'profile-info';
                        profileInfoDiv.onclick = toggleProfileDropdown;

                        const avatarDiv = document.createElement('div');
                        avatarDiv.className = 'avatar';
                        if (userData.avatar_url) {
                            const avatarImg = document.createElement('img');
                            avatarImg.src = userData.avatar_url;
                            avatarImg.alt = 'User Avatar';
                            avatarDiv.appendChild(avatarImg);
                        } else {
                            avatarDiv.textContent = userData.username.charAt(0).toUpperCase(); // Перша літера імені
                        }
                        profileInfoDiv.appendChild(avatarDiv);

                        const usernameSpan = document.createElement('span');
                        usernameSpan.textContent = userData.username;
                        profileInfoDiv.appendChild(usernameSpan);

                        // authContainer.appendChild(profileInfoDiv); // Re-add if authContainer is uncommented

                        const profileDropdownDiv = document.createElement('div');
                        profileDropdownDiv.className = 'profile-dropdown';
                        profileDropdownDiv.id = 'profileDropdown';

                        const nameP = document.createElement('p');
                        nameP.textContent = `Ім'я користувача: ${userData.username}`;
                        profileDropdownDiv.appendChild(nameP);

                        if (userData.name) {
                            const realNameP = document.createElement('p');
                            realNameP.textContent = `Справжнє ім'я: ${userData.name}`;
                            profileDropdownDiv.appendChild(realNameP);
                        }

                        const accountButton = document.createElement('button');
                        accountButton.className = 'auth-button account-btn'; // Додаємо клас для стилів
                        accountButton.textContent = 'Мій акаунт';
                        accountButton.onclick = () => window.location.href = '/account';
                        profileDropdownDiv.appendChild(accountButton);

                        const logoutButton = document.createElement('button');
                        logoutButton.textContent = 'Вийти';
                        logoutButton.onclick = logoutUser;
                        profileDropdownDiv.appendChild(logoutButton);

                        // authContainer.appendChild(profileDropdownDiv); // Re-add if authContainer is uncommented

                    } else {
                        // Користувач не авторизований
                        // renderAuthButtons(); // Re-add if renderAuthButtons is uncommented
                    }
                } else {
                    // Сервер повернув помилку або користувач не авторизований
                    // renderAuthButtons(); // Re-add if renderAuthButtons is uncommented
                }
            } catch (error) {
                console.error('Помилка перевірки сесії:', error);
                // renderAuthButtons(); // У випадку помилки теж показуємо кнопки авторизації // Re-add if renderAuthButtons is uncommented
            }
        }

        // Функція для відображення кнопок "Увійти" та "Зареєструватися"
        // function renderAuthButtons() {
        //     const authContainer = document.getElementById('authContainer');

        //         <a href="/register" class="register-button">Зареєструватися</a>

        // Функція для перемикання випадаючого меню профілю
        function toggleProfileDropdown() {
            const dropdown = document.getElementById('profileDropdown');
            if (dropdown) {
                dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
            }
        }

        // Обробник кліку поза випадаючим меню для його закриття
        document.addEventListener('click', (event) => {
            const authContainer = document.getElementById('authContainer');
            const dropdown = document.getElementById('profileDropdown');
            if (dropdown && authContainer && !authContainer.contains(event.target)) {
                dropdown.style.display = 'none';
            }
        });

        // Функція для виходу користувача
        async function logoutUser() {
            try {
                const response = await fetch('/api/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    window.location.reload(); // Перезавантажуємо сторінку після успішного виходу
                } else {
                    // Using a custom modal message instead of alert()
                    const modal = document.createElement('div');
                    modal.className = 'modal';
                    modal.innerHTML = `
                        <div class="modal-content">
                            <h3>Помилка</h3>
                            <p>Помилка при виході. Спробуйте ще раз.</p>
                            <button onclick="this.closest('.modal').style.display='none'">Закрити</button>
                        </div>
                    `;
                    document.body.appendChild(modal);
                    modal.style.display = 'flex';
                    console.error('Помилка виходу:', await response.text());
                }
            } catch (error) {
                // Using a custom modal message instead of alert()
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.innerHTML = `
                    <div class="modal-content">
                        <h3>Помилка мережі</h3>
                        <p>Помилка мережі при виході. Перевірте з'єднання.</p>
                        <button onclick="this.closest('.modal').style.display='none'">Закрити</button>
                    </div>
                `;
                document.body.appendChild(modal);
                modal.style.display = 'flex';
                console.error('Помилка мережі при виході:', error);
            }
        }

        // Викликаємо функцію перевірки сесії при завантаженні сторінки
        // document.addEventListener('DOMContentLoaded', checkUserSession); // This was commented out in original selection
    </script>
