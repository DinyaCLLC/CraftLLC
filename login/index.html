<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — CraftLLC</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <style>
        body {
            background: #141414;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ffa516;
            border-radius: 5px;
            background-color: #333;
            color: white;
            box-sizing: border-box;
        }
        button {
            background: linear-gradient(to right, #FFA600, #FFBB00);
            width: 90%;
            height: 40px;
            border-radius: 10px;
            color: #212121;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }
        .message {
            margin-top: 15px;
            color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Вхід</h1>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Ім'я користувача" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Увійти</button>
        </form>
        <p class="message" id="message"></p>
        <a href="/register">Немає облікового запису? Зареєструватись</a>
        <br>
        <a href="/">На головну</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageElement = document.getElementById('message');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    messageElement.textContent = 'Вхід успішний! Перенаправлення...';
                    messageElement.style.color = 'green';
                    window.location.href = '/';
                } else {
                    const error = await response.json();
                    messageElement.textContent = error.error || 'Помилка входу. Спробуйте ще раз.';
                    messageElement.style.color = 'red';
                }
            } catch (error) {
                console.error('Login error:', error);
                messageElement.textContent = 'Помилка мережі. Перевірте з\'єднання.';
                messageElement.style.color = 'red';
            }
        });
    </script>
</body>
</html>
