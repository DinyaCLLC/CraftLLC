<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Акаунт — CraftLLC</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/account.css">

</head>
<body>
    <header>
        <button class="menu-toggle" aria-label="Перемкнути навігаційну панель" aria-expanded="false">
            <i class="fas fa-bars"></i>
        </button>
        <div class="logo-container">
            <a href="/">
                <img src="/static/img/logo.png" id="header-logo" alt="Логотип CraftLLC">
            </a>
        </div>
        <nav class="nav-menu">
            <ul>
                <li><a href="/">Головна</a></li>
                <li><a href="/contacts">Контакти</a></li>
                <li><a href="/recipes">Рецепти</a></li>
                <li><a href="/account" class="active">Акаунт</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Auth Section -->
        <section id="authSection" class="hidden">
            <div id="loginForm" class="auth-container">
                <h2>Вхід</h2>
                <div class="form-group">
                    <label>Логін</label>
                    <input type="text" id="loginUsername" placeholder="Введіть логін">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Введіть пароль">
                </div>
                <button class="auth-btn" onclick="handleLogin()">Увійти</button>
                <div class="auth-switch">
                    Немає акаунту? <a href="#" onclick="showRegister()">Зареєструватися</a>
                </div>
            </div>

            <div id="registerForm" class="auth-container hidden">
                <h2>Реєстрація</h2>
                <div class="form-group">
                    <label>Логін</label>
                    <input type="text" id="regUsername" placeholder="Придумайте логін">
                </div>
                <div class="form-group">
                    <label>Нікнейм</label>
                    <input type="text" id="regNickname" placeholder="Як вас називати?">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="Придумайте пароль">
                </div>
                <button class="auth-btn" onclick="handleRegister()">Зареєструватися</button>
                <div class="auth-switch">
                    Вже є акаунт? <a href="#" onclick="showLogin()">Увійти</a>
                </div>
            </div>
            <div id="authMessage" style="text-align: center; max-width: 400px; margin: 10px auto;"></div>
        </section>

        <!-- Profile Section -->
        <section id="profileSection" class="hidden">
            <div class="profile-container">
                <button class="logout-btn" onclick="handleLogout()">Вийти</button>
                <div class="profile-header">
                    <div class="profile-avatar" id="avatarLetter">?</div>
                    <div class="profile-info">
                        <h2 id="displayNickname">Завантаження...</h2>
                        <p id="displayUsername">@username</p>
                    </div>
                </div>

                <div class="action-sections">
                    <div class="action-card">
                        <h3>Змінити профіль</h3>
                        <div class="form-group">
                            <label>Новий нікнейм</label>
                            <input type="text" id="updateNickname" placeholder="Введіть новий нік">
                        </div>
                        <div class="form-group">
                            <label>Новий пароль (залиште порожнім, якщо не змінюєте)</label>
                            <input type="password" id="updateNewPassword" placeholder="Новий пароль">
                        </div>
                        <div class="form-group">
                            <label>Поточний пароль (для підтвердження змін)</label>
                            <input type="password" id="updateCurrentPassword" placeholder="Поточний пароль">
                        </div>
                        <button class="auth-btn" onclick="handleUpdate()">Зберегти зміни</button>
                    </div>

                    <div class="danger-zone">
                        <h3>Небезпечна зона</h3>
                        <p>Видалення акаунту є незворотною дією. Усі ваші дані будуть видалені.</p>
                        <div class="form-group">
                            <label>Введіть пароль для підтвердження видалення</label>
                            <input type="password" id="deletePassword" placeholder="Ваш пароль">
                        </div>
                        <button class="auth-btn" style="background: #f44336;" onclick="handleDelete()">Видалити акаунт</button>
                    </div>
                </div>
                <div id="profileMessage" style="text-align: center; margin-top: 20px;"></div>
            </div>
        </section>
    </main>

    <div id="loader-wrapper">
        <div class="loader"></div>
    </div>

    <script src="/static/js/main.js"></script>
    <script>
        async function fetchMe() {
            try {
                const res = await fetch('/api/auth/me');
                if (res.ok) {
                    const user = await res.json();
                    showProfile(user);
                } else {
                    showAuth();
                }
            } catch (e) {
                showAuth();
            } finally {
                document.getElementById('loader-wrapper').style.display = 'none';
            }
        }

        function showAuth() {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('profileSection').classList.add('hidden');
        }

        function showProfile(user) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('profileSection').classList.remove('hidden');
            
            document.getElementById('displayNickname').textContent = user.nickname;
            document.getElementById('displayUsername').textContent = '@' + user.username;
            document.getElementById('avatarLetter').textContent = user.nickname.charAt(0).toUpperCase();
            document.getElementById('updateNickname').value = user.nickname;
        }

        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        function showMsg(id, text, isError) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = isError ? 'msg-error' : 'msg-success';
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 5000);
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            
            const data = await res.json();
            if (res.ok) {
                location.reload();
            } else {
                showMsg('authMessage', data.error || 'Помилка входу', true);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value;
            const nickname = document.getElementById('regNickname').value;
            const password = document.getElementById('regPassword').value;
            
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, nickname, password })
            });
            
            const data = await res.json();
            if (res.ok) {
                showMsg('authMessage', 'Реєстрація успішна! Тепер увійдіть.', false);
                setTimeout(showLogin, 2000);
            } else {
                showMsg('authMessage', data.error || 'Помилка реєстрації', true);
            }
        }

        async function handleLogout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            location.reload();
        }

        async function handleUpdate() {
            const nickname = document.getElementById('updateNickname').value;
            const newPassword = document.getElementById('updateNewPassword').value;
            const currentPassword = document.getElementById('updateCurrentPassword').value;
            
            if (!currentPassword) {
                showMsg('profileMessage', 'Введіть поточний пароль для підтвердження', true);
                return;
            }

            const res = await fetch('/api/auth/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, currentPassword, newPassword: newPassword || undefined })
            });
            
            const data = await res.json();
            if (res.ok) {
                showMsg('profileMessage', 'Дані оновлено!', false);
                setTimeout(() => location.reload(), 2000);
            } else {
                showMsg('profileMessage', data.error || 'Помилка оновлення', true);
            }
        }

        async function handleDelete() {
            const password = document.getElementById('deletePassword').value;
            if (!password) {
                showMsg('profileMessage', 'Введіть пароль для видалення', true);
                return;
            }

            if (!confirm('Ви впевнені, що хочете видалити акаунт? Це неможливо скасувати.')) return;

            const res = await fetch('/api/auth/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            
            if (res.ok) {
                alert('Акаунт видалено');
                location.href = '/';
            } else {
                const data = await res.json();
                showMsg('profileMessage', data.error || 'Помилка видалення', true);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchMe);
    </script>
</body>
</html>
