<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій акаунт — CraftLLC</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <style>
        body {
            background: #141414;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            text-align: left;
        }
        h1, h2 {
            text-align: center;
        }
        .info-row {
            margin-bottom: 10px;
        }
        .info-row b {
            font-weight: bold;
        }
        .button-group {
            margin-top: 20px;
            text-align: center;
        }
        button {
            background: linear-gradient(to right, #FFA600, #FFBB00);
            color: #212121;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container" id="accountContainer">
        <h1>Завантаження...</h1>
    </div>

    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        async function renderAccountPage() {
            const container = document.getElementById('accountContainer');
            const sessionToken = getCookie('session_token');

            if (!sessionToken) {
                window.location.href = '/login';
                return;
            }

            try {
                const response = await fetch('/api/user', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' },
                });

                if (response.ok) {
                    const user = await response.json();
                    container.innerHTML = `
                        <h2>Особистий кабінет</h2>
                        <div class="info-row"><b>Ім'я користувача:</b> ${user.username}</div>
                        <div class="info-row"><b>Ім'я:</b> ${user.name}</div>
                        <div class="info-row"><b>Прізвище:</b> ${user.surname}</div>
                        <div class="info-row"><b>Електронна пошта:</b> ${user.email}</div>
                        <div class="button-group">
                            <button onclick="window.location.href='/'">На головну</button>
                            <button onclick="logoutUser()">Вийти</button>
                        </div>
                    `;
                } else {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error("Помилка завантаження даних акаунта:", error);
                window.location.href = '/login';
            }
        }

        async function logoutUser() {
            try {
                const response = await fetch('/api/logout', { method: 'POST' });
                if (response.ok) {
                    window.location.href = '/login';
                } else {
                    console.error('Logout failed');
                }
            } catch (error) {
                console.error('Network error during logout:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', renderAccountPage);
    </script>
</body>
</html>
