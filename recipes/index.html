<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="На сайті CraftLLC, ви знайдете корисні рецепти. І всі перевірені!">
    <meta name="keywords" content="CraftLLC, craftllc.pages.dev, Site, Сайт, Рецепти, Бабуся.">
    <meta name="robots" content="index, follow">
    <title>Рецепти — CraftLLC</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" id="favicon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #141414;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .loader {
            width: 50px;
            aspect-ratio: 1;
            border-radius: 50%;
            background:
                radial-gradient(farthest-side,#ffa516 94%,#0000) top/8px 8px no-repeat,
                conic-gradient(#0000 30%,#ffa516);
            -webkit-mask: radial-gradient(farthest-side,#0000 calc(100% - 8px),#000 0);
            animation: l13 1s infinite linear;
        }
        @keyframes l13{
            100%{transform: rotate(1turn)}
        }

        body {
            background: #141414;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            align-items: center;
        }
        input, select {
            width: 90%;
            height: 40px;
            border: 1px solid orange;
            border-radius: 10px;
            cursor: text;
            font-size: 16px;
            padding: 0 10px;
            box-sizing: border-box;
            margin-bottom: 15px;
            background-color: #141414;
            color: white;
        }
        button {
            background: linear-gradient(to right, #FFA600, #FFBB00);
            height: 45px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            color: #141414;
            font-weight: bold;
        }
        
        h1, h2 { margin: 20px 0; }
        p { margin: 10px 0; }
        a { text-decoration: none; color: white; }

        header {
            padding: 10px;
            background-color: #161616;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container img { height: 40px; width: auto; display: block; }
        .nav-menu ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 20px; }
        .nav-menu a { color: white; text-decoration: none; padding: 5px 10px; font-weight: bold; transition: color 0.3s; }
        .nav-menu a:hover { color: #FFA600; }
        
        .menu-toggle { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .menu-toggle i { display: flex; align-self: start; }

        footer { margin: 0; padding: 40px 0; background-color: #161616; box-sizing: border-box; width: 100%; }
        footer .social { text-align: center; padding-bottom: 25px; font-size: 24px; }
        footer .social a { border: 1px solid #ccc; border-radius: 30%; width: 40px; height: 40px; line-height: 38px; display: inline-block; text-align: center; margin: 0 6px; opacity: 0.75; }
        footer .social a:hover { opacity: 1.0; }
        footer .copyright { margin-top: 5px; text-align: center; font-size: 13px; color: #aaa; }

        .card { position: relative; max-width: 420px; border-radius: 12px; overflow: hidden; box-shadow: 0px 0px 15px 0px rgba(0,0,0,.4); background-color: #1f1f1f; margin: 20px auto; display: none; }
        .card__vid { display: block; width: 100%; height: 240px; max-width: 100%; object-fit: contain; }
        .card__body { padding: 20px; text-align: left; }
        .card__title { display: inline-block; margin-bottom: 20px; font-size: 21px; font-weight: 700; transition: color .3s; }
        .card__title:hover { color: orange; }
        .card__desc { font-size: 16px; margin: 0; }
        
        #pagination-controls { margin-top: 30px; display: flex; justify-content: center; align-items: center; }
        .pagination-btn { background: orange; color: white; border: none; padding: 10px 20px; margin: 0 10px; border-radius: 8px; cursor: pointer; font-size: 16px; width: auto; }
        .pagination-btn:disabled { background: #555; cursor: not-allowed; }
        #page-info { font-size: 18px; }
        #searchResultsCount { margin-top: 10px; font-size: 18px; color: #ffa516; }

        .card-actions { margin-bottom: 15px; }
        .like-recipe-btn { width: auto; padding: 5px 12px; font-size: 1em; background: #444; color: white; }
        .like-recipe-btn.liked { background: #e84393; }

        .comments-section { padding: 20px; margin-top: 20px; border-top: 1px solid #444; text-align: left; }
        .comments-section h3, .comment-form h4 { margin-top: 0; margin-bottom: 15px; }
        .comment-form textarea { width: 100%; box-sizing: border-box; background-color: #333; color: white; border: 1px solid #555; border-radius: 5px; padding: 10px; min-height: 80px; margin-bottom: 10px; }
        .comment-form button { width: auto; padding: 8px 15px; }
        .comments-list { margin-top: 20px; }
        .comment { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .comment-author { font-weight: bold; color: #ffa516; }
        .comment-content { margin: 8px 0; }
        .comment-actions { display: flex; align-items: center; gap: 15px; font-size: 0.9em; color: #aaa; }
        .comment-actions button { background: none; border: none; color: #aaa; cursor: pointer; padding: 0; margin: 0; font-size: 1em; display: flex; align-items: center; gap: 5px; }
        .comment-actions button:hover { color: white; }
        .comment-actions .like-comment-btn.liked { color: #e84393; }
        .replies { margin-left: 30px; margin-top: 10px; border-left: 2px solid #444; padding-left: 15px; }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-menu { display: none; position: absolute; top: 60px; left: 0; width: 100%; background-color: #161616; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); z-index: 1000; text-align: left; }
            .nav-menu.active { display: block; }
            .nav-menu ul { flex-direction: column; padding: 10px 5%; }
            .nav-menu li { margin: 0; }
            .nav-menu a { display: block; padding: 10px 0; border-bottom: 1px solid #222; }
            .nav-menu li:last-child a { border-bottom: none; }
        }
    </style>
</head>
<body>
    <noscript>
        <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #141414; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10001; text-align: center; padding: 20px;">
            <h1>JavaScript вимкнено</h1>
            <p>Цей сайт вимагає увімкненого JavaScript для коректної роботи.</p>
        </div>
    </noscript>
    
    <div id="loader-wrapper">
        <div class="loader"></div>
    </div>

    <header>
        <button class="menu-toggle" aria-label="Перемкнути навігаційну панель" aria-expanded="false">
            <i class="fas fa-bars"></i>
        </button>
        <div class="logo-container">
            <a href="/"><img src="/logo.png" id="header-logo" alt="Логотип CraftLLC"></a>
        </div>
        <nav class="nav-menu">
            <ul>
                <li><a href="/">Головна</a></li>
                <li><a href="/contacts">Контакти</a></li>
                <li><a href="/recipes">Рецепти</a></li>
            </ul>
        </nav>
        <div id="auth-container" style="margin-right: 15px;"></div>
    </header>
    
    <h1>Рецепти</h1>
    <a href="https://youtube.com/playlist?list=PL0xBJmae_beLTo8ZoxhZVAtAH1_AVBuWj&si=A3gNpVT4yGhvHVC" target="_blank"><button style="width: 90%; max-width: 300px;">Відкрити список відтворення</button></a>
    <br><br>

    <div class="search-container"><input type="text" id="recipeSearch" placeholder="Пошук рецептів..."></div>
    <div class="sort-container">
        <select id="recipeSort">
            <option value="all">Всі рецепти</option>
            <option value="cookie">Печиво</option>
            <option value="cake">Торти</option>
            <option value="pudding">Запіканки</option>
            <option value="pie">Пироги</option>
        </select>
    </div>
    <div id="searchResultsCount"></div>
    <div id="recipesContainer"></div>
    <div id="pagination-controls">
        <button id="prev-page" class="pagination-btn">Назад</button>
        <span id="page-info"></span>
        <button id="next-page" class="pagination-btn">Вперед</button>
    </div>

    <br><br><br><br>
    <footer id="footerID">
        <div class="social">
            <a href="https://t.me/CraftLLC" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://m.youtube.com/@CraftLLCOF" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://github.com/CraftLLC" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://x.com/NotCraftLLC" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://instagram.com/CraftLLC" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
        <p class="copyright">© Андрій Рудик 2024-2025</p>
    </footer>

    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "86e4717144d44d26a30bb98452c1e06b"}'></script>
    <script>
    // --- ГЛОБАЛЬНІ ЗМІННІ ТА СТАН ---
    let currentPage = 1;
    let filteredCards = [];
    const recipesPerPage = 5;
    let allRecipes = [];
    let currentUser = null;

    // --- ЛОГІКА АВТЕНТИФІКАЦІЇ ТА ІНІЦІАЛІЗАЦІЇ ---
    document.addEventListener('DOMContentLoaded', () => {
        const authContainer = document.getElementById('auth-container');

        const checkLoginStatus = async () => {
            try {
                const response = await fetch('/api/me');
                if (response.ok) {
                    currentUser = await response.json();
                    renderLoggedIn(currentUser);
                } else {
                    renderLoggedOut();
                }
            } catch (error) {
                console.error('Error checking login status:', error);
                renderLoggedOut();
            }
            initializePage();
        };

        const renderLoggedOut = () => {
            if (!authContainer) return;
            authContainer.innerHTML = `
                <a href="/register/" class="btn btn-secondary" style="color: #fff; background-color: #333;">Реєстрація</a>
                <a href="/login/" class="btn btn-primary" style="color: #141414; background-color: #FFA600;">Вхід</a>
            `;
        };

        const renderLoggedIn = (user) => {
            if (!authContainer) return;
            const initial = user.username.charAt(0).toUpperCase();
            authContainer.innerHTML = `
                <a href="/account/" id="profile-icon" title="Мій акаунт" style="background-color: #FFA600; color: #141414;">${initial}</a>
                <button id="logout-btn" title="Вийти" style="width: auto; margin-left: 15px;">Вийти</button>
            `;
            document.getElementById('logout-btn').addEventListener('click', handleLogout);
        };

        const handleLogout = async () => {
            await fetch('/api/logout', { method: 'POST' });
            currentUser = null;
            window.location.reload();
        };

        checkLoginStatus();
    });

    function initializePage() {
        const loader = document.getElementById('loader-wrapper');
        if (loader) loader.style.display = 'none';
        setSpecialDateAssets();

        const menuToggle = document.querySelector('.menu-toggle');
        const navMenu = document.querySelector('.nav-menu');
        if (menuToggle && navMenu) {
            menuToggle.addEventListener('click', () => {
                navMenu.classList.toggle('active');
                menuToggle.setAttribute('aria-expanded', String(navMenu.classList.contains('active')));
            });
        }

        const searchInput = document.getElementById('recipeSearch');
        const sortSelect = document.getElementById('recipeSort');
        const prevButton = document.getElementById('prev-page');
        const nextButton = document.getElementById('next-page');

        loadRecipes().then(() => {
            searchInput.addEventListener('keyup', filterAndSortRecipes);
            sortSelect.addEventListener('change', filterAndSortRecipes);
            prevButton.addEventListener('click', () => { if (currentPage > 1) { currentPage--; displayPage(currentPage); } });
            nextButton.addEventListener('click', () => {
                const totalPages = Math.ceil(filteredCards.length / recipesPerPage);
                if (currentPage < totalPages) { currentPage++; displayPage(currentPage); }
            });
        });
    }

    function setSpecialDateAssets() {
        const today = new Date();
        const day = today.getDate();
        const month = today.getMonth() + 1;
        const favicon = document.getElementById('favicon');
        const logo = document.getElementById('header-logo');
        if (month === 1 && day === 1) { favicon.href = '/favicon2.ico'; logo.src = '/logo2.png'; }
        else if (month === 3 && day === 8) { favicon.href = '/favicon.ico'; logo.src = '/logo3.png'; }
        else if (month === 9 && day === 26) { favicon.href = '/favicon_birthday.ico'; logo.src = '/logo_birthday.png'; }
        else { favicon.href = '/favicon.ico'; logo.src = '/logo.png'; }
    }

    // --- ЛОГІКА РЕЦЕПТІВ ---
    async function loadRecipes() {
        const response = await fetch('list.json');
        allRecipes = await response.json();
        filterAndSortRecipes();
    }

    function filterAndSortRecipes() {
        const searchTerm = document.getElementById('recipeSearch').value.toLowerCase().trim();
        const selectedType = document.getElementById('recipeSort').value;
        filteredCards = allRecipes.filter(recipe => {
            const matchesType = selectedType === 'all' || recipe.recipe_type === selectedType;
            if (!matchesType) return false;
            if (searchTerm === '') return true;
            const cardText = `${recipe.name} ${recipe.keywords.join(' ')} ${recipe.description || ''}`.toLowerCase();
            return searchTerm.split(' ').filter(w => w.length > 0).every(queryWord => cardText.includes(queryWord));
        });
        currentPage = 1;
        displayPage(currentPage);
    }

    function displayPage(page) {
        const recipesContainer = document.getElementById('recipesContainer');
        recipesContainer.innerHTML = '';
        const pageRecipes = filteredCards.slice((page - 1) * recipesPerPage, page * recipesPerPage);
        pageRecipes.forEach(recipe => recipesContainer.appendChild(generateRecipeCard(recipe)));
        updatePaginationControls();
    }
    
    function generateRecipeCard(recipe) {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.recipeId = recipe.id;

        let videoElement = recipe.video_id ? `<iframe class="card__vid" src="https://youtube.com/embed/${recipe.video_id}?rel=0" frameborder="0" allowfullscreen></iframe>` : (recipe.video_src ? `<video class="card__vid" src="${recipe.video_src}" preload controls></video>` : '');
        let ingredientsHtml = '';
        recipe.ingredients.forEach(group => {
            ingredientsHtml += group._name ? `<br><b>Для ${group._name}:</b><br>` : `<br><b>Інгредієнти:</b><br>`;
            for (const [name, amount] of Object.entries(group)) {
                if (name !== '_name') ingredientsHtml += `${name} - ${amount || ''}<br>`;
            }
        });

        card.innerHTML = `
            ${videoElement}
            <div class="card__body">
                <a href="${recipe.video_id ? `https://youtube.com/watch?v=${recipe.video_id}` : '#'}" class="card__title" target="_blank">${recipe.name}</a>
                <div class="card-actions">
                    <button class="like-recipe-btn"><i class="fas fa-heart"></i> <span>${recipe.likes_count || 0}</span></button>
                </div>
                <p class="card__desc">${recipe.description || ''}${ingredientsHtml}</p>
                <div class="comments-section">
                    <h3>Коментарі</h3>
                    <div class="comment-form">
                        <h4>Напишіть свій коментар...</h4>
                        <textarea placeholder="Ваш коментар"></textarea>
                        <button class="submit-comment">Відправити</button>
                    </div>
                    <div class="comments-list"></div>
                </div>
            </div>
        `;
        
        addEventListeners(card, recipe);
        loadComments(recipe.id, card.querySelector('.comments-list'));
        return card;
    }

    function updatePaginationControls() {
        const totalPages = Math.ceil(filteredCards.length / recipesPerPage);
        document.getElementById('page-info').textContent = `Сторінка ${currentPage} з ${totalPages > 0 ? totalPages : 1}`;
        document.getElementById('prev-page').disabled = currentPage === 1;
        document.getElementById('next-page').disabled = currentPage === totalPages || totalPages === 0;
        document.getElementById('searchResultsCount').textContent = `Знайдено рецептів: ${filteredCards.length}`;
    }

    // --- ЛОГІКА КОМЕНТАРІВ ---
    function addEventListeners(card, recipe) {
        const commentsList = card.querySelector('.comments-list');
        const commentForm = card.querySelector('.comment-form');
        const formTitle = commentForm.querySelector('h4');
        const textarea = commentForm.querySelector('textarea');

        commentForm.querySelector('.submit-comment').addEventListener('click', async () => {
            const content = textarea.value.trim();
            const parentId = commentForm.dataset.parentId;
            if (!content) return;
            if (!currentUser) { alert('Будь ласка, увійдіть, щоб залишити коментар.'); window.location.href = '/login/'; return; }

            const url = parentId ? `/api/comments/${parentId}/replies` : `/api/recipes/${recipe.id}/comments`;
            const body = parentId ? { content, recipe_id: recipe.id } : { content };

            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                if (response.ok) {
                    textarea.value = '';
                    if (formTitle) formTitle.textContent = 'Напишіть свій коментар...';
                    delete commentForm.dataset.parentId;
                    loadComments(recipe.id, commentsList);
                } else { alert(`Помилка: ${(await response.json()).error}`); }
            } catch (e) { alert('Помилка мережі.'); }
        });

        commentsList.addEventListener('click', async (e) => {
            const likeBtn = e.target.closest('.like-comment-btn');
            const replyBtn = e.target.closest('.reply-btn');

            if (likeBtn) {
                if (!currentUser) { alert('Будь ласка, увійдіть, щоб ставити вподобайки.'); return; }
                const commentEl = e.target.closest('.comment');
                const commentId = commentEl.dataset.commentId;
                try {
                    const response = await fetch('/api/like', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ comment_id: commentId }) });
                    const result = await response.json();
                    if (result.success) {
                        const countSpan = likeBtn.querySelector('span');
                        countSpan.textContent = result.liked ? parseInt(countSpan.textContent) + 1 : parseInt(countSpan.textContent) - 1;
                        likeBtn.classList.toggle('liked', result.liked);
                    }
                } catch (err) { alert('Помилка мережі.'); }
            }

            if (replyBtn) {
                const commentEl = e.target.closest('.comment');
                const author = commentEl.querySelector('.comment-author').textContent;
                if (formTitle) formTitle.textContent = `Відповідь для ${author}`;
                commentForm.dataset.parentId = commentEl.dataset.commentId;
                textarea.focus();
            }
        });
        
        card.querySelector('.like-recipe-btn').addEventListener('click', async (e) => {
            if (!currentUser) { alert('Будь ласка, увійдіть, щоб ставити вподобайки.'); return; }
            const likeBtn = e.currentTarget;
            try {
                const response = await fetch('/api/like', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ recipe_id: recipe.id }) });
                const result = await response.json();
                if (result.success) {
                    const countSpan = likeBtn.querySelector('span');
                    countSpan.textContent = result.liked ? parseInt(countSpan.textContent) + 1 : parseInt(countSpan.textContent) - 1;
                    likeBtn.classList.toggle('liked', result.liked);
                }
            } catch (err) { alert('Помилка мережі.'); }
        });
    }

    async function loadComments(recipeId, commentsListElement) {
        try {
            const response = await fetch(`/api/recipes/${recipeId}/comments`);
            if (!response.ok) throw new Error('Failed to load comments');
            const comments = await response.json();
            commentsListElement.innerHTML = '';
            if (comments.length === 0) {
                commentsListElement.innerHTML = '<p style="color: #aaa; font-size: 0.9em;">Коментарів ще немає. Будьте першим!</p>';
            } else {
                comments.forEach(comment => commentsListElement.appendChild(renderComment(comment)));
            }
        } catch (error) {
            console.error(error);
            commentsListElement.innerHTML = '<p>Не вдалося завантажити коментарі.</p>';
        }
    }

    function renderComment(comment) {
        const div = document.createElement('div');
        div.classList.add('comment');
        div.dataset.commentId = comment.id;
        const authorName = (comment.author && comment.author.username) ? comment.author.username : 'Анонім';
        div.innerHTML = `
            <p class="comment-author">
${authorName}</p>
            <p class="comment-content">
${comment.content.replace(/\n/g, '<br>')}</p>
            <div class="comment-actions">
                <button class="like-comment-btn"><i class="fas fa-heart"></i> <span>${comment.likes_count || 0}</span></button>
                <button class="reply-btn">Відповісти</button>
            </div>
            <div class="replies"></div>
        `;
        if (comment.replies && comment.replies.length > 0) {
            const repliesContainer = div.querySelector('.replies');
            comment.replies.forEach(reply => repliesContainer.appendChild(renderComment(reply)));
        }
        return div;
    }
    </script>
</body>
</html>
