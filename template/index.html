<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | CraftLLC</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/main.css">
    
    <!-- Open Graph for Telegram Instant View -->
    <meta property="og:site_name" content="CraftLLC">
    <meta property="og:title" content="{{TITLE}} | CraftLLC">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="{{URL}}">
    <meta property="og:image" content="https://craftllc.pages.dev/static/img/logo.png">
    <meta property="og:locale" content="uk_UA">
    <meta property="article:author" content="CraftLLC Internal">
    <meta name="author" content="CraftLLC Internal">
</head>

<body>
    <header>
        <button class="menu-toggle" aria-label="Перемкнути навігаційну панель" aria-expanded="false">
            <i class="fas fa-bars"></i>
        </button>

        <div class="logo-container">
            <a href="/">
                <img src="/static/img/logo.png" id="header-logo" alt="Логотип CraftLLC">
            </a>
        </div>

        <nav class="nav-menu">
            <ul>
                <li><a href="/">Головна</a></li>
                <li><a href="/contacts">Контакти</a></li>
                <li><a href="/recipes">Рецепти</a></li>
                <li><a href="/account">Акаунт</a></li>
            </ul>
        </nav>
    </header>

    <div id="loader-wrapper">
        <div class="loader"></div>
    </div>

    <main class="legal-container">
        <article>
            <header class="legal-header">
                <h1>{{HEADING}}</h1>
                <p class="last-updated">Останнє оновлення: 15 березня 2026</p>
            </header>
            
            <section>
                {{CONTENT}}
            </section>
        </article>
    </main>

    <footer id="footerID">
        <div class="social">
            <a href="https://t.me/CraftLLC" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://m.youtube.com/@CraftLLCOF" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://github.com/CraftLLC" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://x.com/NotCraftLLC" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://instagram.com/CraftLLC" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
        <p>
            <a href="/privacy" style="color: #aaa; font-size: 13px; text-decoration: underline;">Політика конфіденційності</a> | 
            <a href="/terms" style="color: #aaa; font-size: 13px; text-decoration: underline;">Умови використання</a>
        </p>
        <p class="copyright">© Андрій Рудик 2024-2025</p>
    </footer>

    <script src="/static/js/main.js"></script>
</body>

</html>
