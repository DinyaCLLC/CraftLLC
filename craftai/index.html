<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CraftAI - швидкий доступ до штучного інтелекту Gemini на сайті CraftLLC.">
    <meta name="keywords" content="CraftLLC, CraftAI, Gemini, AI, ШІ, Чат">
    <meta name="robots" content="index, follow">
    <title>CraftAI — CraftLLC</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <style>
        body {
            background: #141414;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: 70px;
        }

        /* Стилі для хедера (Flexbox) - копія з головної */
        header {
            padding: 10px;
            background-color: #161616;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .logo-container img {
            height: 40px;
            width: auto;
            display: block;
        }

        .nav-menu ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }

        .nav-menu a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            font-weight: bold;
            transition: color 0.3s;
        }

        .nav-menu a:hover {
            color: #FFA600;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        .menu-toggle i {
            display: flex;
            align-self: start;
        }

        /* CraftAI Specific Styles */
        .main-content {
            flex: 1;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .chat-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0px 0px 15px 0px rgba(0, 0, 0, .4);
            background-color: #141414;
            margin: 20px auto;
            padding: 20px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            align-items: center;
        }

        input[type="text"],
        input[type="password"],
        select {
            flex: 1;
            height: 40px;
            padding: 0 10px;
            border-radius: 10px;
            border-style: solid;
            border-color: orange;
            background-color: #141414;
            color: white;
            font-size: 16px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            box-shadow: 0 0 5px orange;
        }

        button.primary-btn {
            background: linear-gradient(to right, #FFA600, #FFBB00);
            color: black;
            border: none;
            width: auto;
            /* Override default width: 90% from recipes if inherited, but here it's specific class */
            height: 45px;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: opacity 0.2s;
            margin-top: 0;
            /* Reset margin */
        }

        button.primary-btn:hover {
            opacity: 0.9;
        }

        button.icon-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 20px;
            cursor: pointer;
            padding: 10px;
        }

        button.icon-btn:hover {
            color: #FFA600;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        /* Custom Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #FFA600;
        }

        input:focus+.slider {
            box-shadow: 0 0 1px #FFA600;
        }

        input:checked+.slider:before {
            -webkit-transform: translateX(26px);
            -ms-transform: translateX(26px);
            transform: translateX(26px);
        }

        .response-area {
            text-align: left;
            white-space: pre-wrap;
            line-height: 1.5;
            font-size: 16px;
            color: #e0e0e0;
            flex: 1;
        }

        .response-placeholder {
            color: #666;
            text-align: center;
            margin-top: 100px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            border: 1px solid #444;
            text-align: left;
        }

        .modal-content h2 {
            margin-top: 0;
            text-align: center;
            color: #FFA600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            font-weight: bold;
        }

        .btn-cancel {
            background-color: #444;
            color: white;
        }

        .btn-save {
            background: linear-gradient(to right, #FFA600, #FFBB00);
            color: black;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 40px 0;
            background-color: #161616;
            width: 100%;
        }

        footer .social {
            text-align: center;
            padding-bottom: 25px;
            font-size: 24px;
        }

        footer .social a {
            border: 1px solid #ccc;
            border-radius: 30%;
            width: 40px;
            height: 40px;
            line-height: 38px;
            display: inline-block;
            text-align: center;
            margin: 0 6px;
            color: white;
            opacity: 0.75;
        }

        footer .social a:hover {
            opacity: 1.0;
        }

        footer .social .fa-telegram {
            color: #29a0dc;
        }

        footer .social .fa-youtube {
            color: #ff0000;
        }

        footer .social .fa-instagram {
            color: #e1306c;
        }

        footer .copyright {
            margin-top: 5px;
            text-align: center;
            font-size: 13px;
            color: #aaa;
        }

        @media (max-width: 768px) {
            .menu-toggle {
                display: block;
            }

            .nav-menu {
                display: none;
                position: absolute;
                top: 60px;
                left: 0;
                width: 100%;
                background-color: #161616;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
                z-index: 1000;
                text-align: left;
            }

            .nav-menu.active {
                display: block;
            }

            .nav-menu ul {
                flex-direction: column;
                padding: 10px 5%;
            }

            .nav-menu a {
                display: block;
                padding: 10px 0;
                border-bottom: 1px solid #222;
            }
        }
    </style>
    <script src="/snow.js" defer></script>
</head>

<body>

    <header>
        <button class="menu-toggle" aria-label="Перемкнути навігаційну панель">
            <i class="fas fa-bars"></i>
        </button>

        <div class="logo-container">
            <a href="/">
                <img src="/logo.png" id="header-logo" alt="Логотип CraftLLC">
            </a>
        </div>

        <nav class="nav-menu">
            <ul>
                <li><a href="/">Головна</a></li>
                <li><a href="/contacts">Контакти</a></li>
                <li><a href="/recipes">Рецепти</a></li>
                <li><a href="/craftai">CraftAI</a></li>
            </ul>
        </nav>
    </header>

    <div class="main-content">
        <h1>CraftAI</h1>

        <div class="controls">
            <div class="toggle-container">
                <label class="switch">
                    <input type="checkbox" id="shortAnswerToggle">
                    <span class="slider"></span>
                </label>
                <span>Коротка відповідь</span>
            </div>
            <button class="icon-btn" id="settingsBtn" title="Налаштування">
                <i class="fas fa-cog"></i>
            </button>
        </div>

        <div class="chat-container">
            <div id="responseArea" class="response-area">
                <div class="response-placeholder">Введіть запит, щоб отримати відповідь від ШІ...</div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Введіть ваш запит тут...">
            <button class="primary-btn" id="sendBtn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2>Налаштування</h2>

            <div class="form-group">
                <label for="apiKey">Gemini API Key</label>
                <input type="password" id="apiKey" placeholder="Введіть ваш API ключ">
                <div style="font-size: 12px; color: #888; margin-top: 5px;">
                    Отримайте ключ на <a href="https://aistudio.google.com/apikey" target="_blank"
                        style="color: #FFA600;">Google AI Studio</a>
                </div>
            </div>

            <div class="form-group">
                <label for="modelSelect">Модель</label>
                <select id="modelSelect">
                    <option value="gemini-flash-latest">gemini-flash-latest</option>
                    <option value="gemini-flash-lite-latest">gemini-flash-lite-latest</option>
                </select>
            </div>

            <div class="modal-buttons">
                <button class="btn-cancel" id="cancelSettings">Скасувати</button>
                <button class="btn-save" id="saveSettings">Зберегти</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="social">
            <a href="https://t.me/CraftLLC" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://m.youtube.com/@CraftLLCOF" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://github.com/CraftLLC" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://x.com/NotCraftLLC" target="_blank"><i class="fab fa-x-twitter"></i></a>
            <a href="https://instagram.com/CraftLLC" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
        <p class="copyright">© Андрій Рудик 2024-2025</p>
    </footer>

    <script>
        // CraftAI Toolset
        const CraftAI = {
            getRandomNumber: (min, max) => {
                if (min === undefined || max === undefined) {
                    return "Будь ласка, вкажіть мінімальне та максимальне значення.";
                }
                min = Math.ceil(min);
                max = Math.floor(max);
                return Math.floor(Math.random() * (max - min + 1)) + min;
            },
            getCurrentTime: (timeZone = 'Europe/Kyiv') => {
                try {
                    const now = new Date();
                    return new Intl.DateTimeFormat('uk-UA', {
                        timeZone: timeZone,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: false
                    }).format(now);
                } catch (e) {
                    return `Помилка: Неправильний часовий пояс '${timeZone}'.`;
                }
            }
        };

        document.addEventListener("DOMContentLoaded", () => {
            // Navigation Toggle
            const menuToggle = document.querySelector('.menu-toggle');
            const navMenu = document.querySelector('.nav-menu');
            if (menuToggle && navMenu) {
                menuToggle.addEventListener('click', () => {
                    navMenu.classList.toggle('active');
                });
            }

            // Elements
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsModal = document.getElementById('settingsModal');
            const cancelSettings = document.getElementById('cancelSettings');
            const saveSettings = document.getElementById('saveSettings');
            const apiKeyInput = document.getElementById('apiKey');
            const modelSelect = document.getElementById('modelSelect');
            const shortAnswerToggle = document.getElementById('shortAnswerToggle');
            const sendBtn = document.getElementById('sendBtn');
            const userInput = document.getElementById('userInput');
            const responseArea = document.getElementById('responseArea');

            // Load Settings from LocalStorage
            const loadSettings = () => {
                const storedKey = localStorage.getItem('gemini_api_key');
                const storedModel = localStorage.getItem('gemini_model');
                const storedShortAnswer = localStorage.getItem('gemini_short_answer');

                if (storedKey) apiKeyInput.value = storedKey;
                if (storedModel) modelSelect.value = storedModel;
                if (storedShortAnswer !== null) {
                    shortAnswerToggle.checked = storedShortAnswer === 'true';
                } else {
                    shortAnswerToggle.checked = true; // Default to true if not set? User said "default"
                }
            };

            loadSettings();

            // Modal Logic
            settingsBtn.addEventListener('click', () => {
                settingsModal.style.display = 'flex';
            });

            const closeModal = () => {
                settingsModal.style.display = 'none';
            };

            cancelSettings.addEventListener('click', closeModal);

            window.addEventListener('click', (e) => {
                if (e.target === settingsModal) closeModal();
            });

            saveSettings.addEventListener('click', () => {
                const key = apiKeyInput.value.trim();
                const model = modelSelect.value;

                if (!key) {
                    alert('Будь ласка, введіть API ключ');
                    return;
                }

                localStorage.setItem('gemini_api_key', key);
                localStorage.setItem('gemini_model', model);
                closeModal();
            });

            // Short Answer Toggle Persistence
            shortAnswerToggle.addEventListener('change', () => {
                localStorage.setItem('gemini_short_answer', shortAnswerToggle.checked);
            });

            // AI Logic
            const generateResponse = async () => {
                const query = userInput.value.trim();
                if (!query) return;

                const apiKey = localStorage.getItem('gemini_api_key');
                const model = localStorage.getItem('gemini_model') || 'gemini-flash-latest';
                const isShortAnswer = shortAnswerToggle.checked;

                if (!apiKey) {
                    responseArea.innerHTML = '<span style="color: #ff4444;">Помилка: API ключ не знайдено. Будь ласка, додайте його в налаштуваннях.</span>';
                    settingsModal.style.display = 'flex';
                    return;
                }

                // UI Loading State
                responseArea.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Думаю...';
                responseArea.style.fontSize = '16px'; // Reset font size
                responseArea.style.textAlign = 'left';
                sendBtn.disabled = true;

                try {
                    let prompt = query;
                    if (isShortAnswer) {
                        prompt = "Provide the shortest possible answer. For example, for '2 + 2' respond only '4', not '2 plus 2 equals 4'. Query: " + query;
                    }

                    // Using Gemini API via REST
                    // Note: Using the v1beta API endpoint
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: prompt
                                }]
                            }]
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error?.message || 'Помилка запиту до API');
                    }

                    const aiText = data.candidates[0].content.parts[0].text;
                    responseArea.textContent = aiText;

                    // Dynamic font size logic
                    const length = aiText.length;
                    if (length < 50) {
                        responseArea.style.fontSize = '32px';
                        responseArea.style.textAlign = 'center';
                        responseArea.style.justifyContent = 'center';
                        responseArea.style.display = 'flex';
                        responseArea.style.alignItems = 'center';
                        responseArea.style.height = '100%';
                    } else if (length < 100) {
                        responseArea.style.fontSize = '24px';
                        responseArea.style.textAlign = 'center';
                        responseArea.style.display = 'block';
                    } else if (length < 200) {
                        responseArea.style.fontSize = '20px';
                        responseArea.style.textAlign = 'left';
                        responseArea.style.display = 'block';
                    } else {
                        responseArea.style.fontSize = '16px';
                        responseArea.style.textAlign = 'left';
                        responseArea.style.display = 'block';
                    }

                } catch (error) {
                    console.error(error);
                    responseArea.innerHTML = `<span style="color: #ff4444;">Помилка: ${error.message}</span>`;
                } finally {
                    sendBtn.disabled = false;
                }
            };

            sendBtn.addEventListener('click', generateResponse);

            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') generateResponse();
            });
        });
    </script>
</body>

</html>
