    <style>
        body {
            background: #141414;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding-top: 20px;
        }
        button {
            background: linear-gradient(to right, #FFA600, #FFBB00);
            width: 90%;
            height: 45px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        h1, h2 {
            margin: 20px 0;
        }
        p {
            margin: 10px 0;
        }
        a {
            text-decoration: none;
            color: white;
        }
        /* Лоадер */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #141414;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loader {
            width: 50px;
            aspect-ratio: 1;
            border-radius: 50%;
            background: 
                radial-gradient(farthest-side,#ffa516 94%,#0000) top/8px 8px no-repeat,
                conic-gradient(#0000 30%,#ffa516);
            -webkit-mask: radial-gradient(farthest-side,#0000 calc(100% - 8px),#000 0);
            animation: l13 1s infinite linear;
        }
        @keyframes l13{ 
            100%{transform: rotate(1turn)}
        }
        header {
            /* Видаляємо відступи, які можуть заважати вирівнюванню */
            padding: 10px 5%; /* Невеликий внутрішній відступ */
            background-color: #161616; /* Додаємо фон для хедера */
            width: 100%;
            box-sizing: border-box; /* Важливо для контролю ширини */
            display: flex; /* Увімкнення Flexbox для горизонтального вирівнювання */
            justify-content: space-between; /* Розносить логотип і навігацію на протилежні кінці */
            align-items: center; /* Центрує по вертикалі */
        }
        .logo-container img {
            height: 40px; /* Задайте фіксовану висоту для логотипу */
            width: auto; /* Автоматична ширина */
            display: block;
        }
        /* Стилі для навігаційної панелі */
        .nav-menu ul {
            list-style: none; /* Прибираємо маркери списку */
            margin: 0;
            padding: 0;
            display: flex; /* Увімкнення Flexbox для горизонтального меню */
            gap: 20px; /* Проміжок між елементами меню */
        }
        .nav-menu a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            font-weight: bold;
            transition: color 0.3s;
        }
        .nav-menu a:hover {
            color: #FFA600; /* Зміна кольору при наведенні */
        }
        footer {
            margin: 0;
            padding: 40px 0;
            background-color: #161616;
            box-sizing: border-box;
            width: 100%;
        }
        footer .social {
            text-align: center;
            padding-bottom: 25px;
            font-size: 24px;
            text-decoration: none;
        }
        footer .social a {
            border: 1px solid #ccc;
            border-radius: 30%;
            width: 40px;
            height: 40px;
            line-height: 38px;
            display: inline-block;
            text-align: center;
            margin: 0 6px;
            opacity: 0.75;
        }
        footer .social a:hover {
            opacity: 1.0;
        }
        footer .social .fa-telegram {
            color: #29a0dc;
        }
        footer .social .fa-youtube {
            color: #ff0000;
        }
        footer .social .fa-instagram {
            color: #e1306c;
        }
        footer .copyright {
            margin-top: 5px;
            text-align: center;
            font-size: 13px;
            color: #aaa;
        }
    </style>
    <header>

    <script>
    // Коли все завантажено – ховаємо лоадер
    window.addEventListener('load', () => {
        const loaderWrapper = document.getElementById('loader-wrapper');
        if (loaderWrapper) {
            loaderWrapper.style.display = 'none';
        }
    });

    function setSpecialDateAssets() {
        const today = new Date();
        const day = today.getDate();
        const month = today.getMonth() + 1;

        const favicon = document.getElementById('favicon');
        const logo = document.getElementById('logo');

        if (month === 1 && day === 1) {
            favicon.href = '/favicon2.ico';
            logo.src = '/logo2.png';
        } 
        else if (month === 3 && day === 8) {
            favicon.href = '/favicon.ico';
            logo.src = '/logo3.png';
        } 
        else if (month === 9 && day === 26) {
            favicon.href = '/favicon_birthday.ico';
            logo.src = '/logo_birthday.png';
        } 
        else {
            favicon.href = '/favicon.ico';
            logo.src = '/logo.png';
        }
    }

    document.addEventListener("DOMContentLoaded", setSpecialDateAssets);
    </script>
